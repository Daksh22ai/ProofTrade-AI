version: "3.8"
services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.11
    container_name: redpanda_kafka
    command:
      - redpanda
      - start
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://localhost:19092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
      - --schema-registry-addr=0.0.0.0:8081
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=localhost:33145
      - --mode=dev-container
      - --smp=2
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "8082:8082"
      - "8081:8081"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  questdb:
    image: questdb/questdb:8.1.0
    container_name: questdb_database
    ports:
      - "9000:9000"   # HTTP API + Web Console
      - "9009:9009"   # ILP TCP ingestion
      - "8812:8812"   # PostgreSQL wire protocol (reads)
    volumes:
      - questdb_data:/root/.questdb
    environment:
      - QDB_TELEMETRY_ENABLED=false
      - QDB_HTTP_ENABLED=true
      - QDB_LINE_TCP_ENABLED=true
      - QDB_PG_ENABLED=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  redpanda_data:
  questdb_data:
